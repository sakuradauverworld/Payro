name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_name: IkkiniOkuru-windows.exe
          - os: macos-latest
            asset_name: IkkiniOkuru-mac.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存関係インストール
        run: pip install -r requirements.txt

      - name: ビルド
        run: pyinstaller IkkiniOkuru.spec

      - name: 成果物を準備（Windows）
        if: runner.os == 'Windows'
        shell: bash
        run: mv dist/IkkiniOkuru.exe dist/IkkiniOkuru-windows.exe

      - name: 成果物を準備（macOS）
        if: runner.os == 'macOS'
        run: cd dist && zip -r IkkiniOkuru-mac.zip IkkiniOkuru.app

      - name: GitHub Releaseに公開
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
